<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber RPS Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Rock Paper Scissors</h1>
        <div class="scoreboard">
            <p>Player: <span id="player-score">0</span></p>
            <p>Computer: <span id="computer-score">0</span></p>
        </div>

        <div class="choices">
            <button class="choice-btn" id="rock">Rock</button>
            <button class="choice-btn" id="paper">Paper</button>
            <button class="choice-btn" id="scissors">Scissors</button>
        </div>

        <div class="result-display">
            <p id="message">Choose your weapon!</p>
            <p id="choices-made"></p>
        </div>
        <div id="result-msg">Choose your move!</div>

<div class="reset-section">
    <button id="reset-btn">Reset Tournament</button>
</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
